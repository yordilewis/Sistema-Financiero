<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#122848"/>
      <stop offset="100%" stop-color="#0B1F3A"/>
    </linearGradient>
    <linearGradient id="gG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#E8C97A"/>
      <stop offset="50%"  stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#A8872E"/>
    </linearGradient>
    <linearGradient id="nG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#122848"/>
      <stop offset="100%" stop-color="#0B1F3A"/>
    </linearGradient>
    <radialGradient id="glowG" cx="35%" cy="30%">
      <stop offset="0%"   stop-color="#C9A84C" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sheen" cx="40%" cy="30%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="roundedRect">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- Rounded background -->
  <g clip-path="url(#roundedRect)">
    <rect width="512" height="512" fill="url(#bgG)"/>
    <!-- Glow top-right -->
    <circle cx="380" cy="140" r="220" fill="url(#glowG)"/>
    <!-- Sheen -->
    <rect width="512" height="512" fill="url(#sheen)"/>

    <!-- Mark scaled to fill icon: scale ~3.6x, centered -->
    <!-- Original mark: 120×124 → scale to ~370×428, centered in 512×512 -->
    <!-- translate: x = (512-120*3.5)/2 = (512-420)/2 = 46 -->
    <!-- translate: y = (512-124*3.5)/2 = (512-434)/2 = 39 -->
    <g transform="translate(46, 39) scale(3.5)">
      <polygon points="60,12 103.3,37 103.3,87 60,112 16.7,87 16.7,37"
        fill="none" stroke="#C9A84C" stroke-width="0.6" stroke-opacity="0.35"/>
      <polygon points="60,12 103.3,37 103.3,87 60,112 16.7,87 16.7,37"
        fill="none" stroke="url(#gG)" stroke-width="1.8" stroke-linejoin="round"/>
      <polygon points="60,18 98.1,40 98.1,84 60,106 21.9,84 21.9,40" fill="url(#nG)"/>
      <polygon points="60,24 92.9,43 92.9,81 60,100 27.1,81 27.1,43"
        fill="none" stroke="#C9A84C" stroke-width="0.7" stroke-opacity="0.45"
        stroke-dasharray="2.8 2.4" stroke-linejoin="round"/>
      <polygon points="60,20.8 62,24 60,27.2 58,24"         fill="#C9A84C" opacity="0.75"/>
      <polygon points="92.9,39.8 94.9,43 92.9,46.2 90.9,43" fill="#C9A84C" opacity="0.75"/>
      <polygon points="92.9,77.8 94.9,81 92.9,84.2 90.9,81" fill="#C9A84C" opacity="0.75"/>
      <polygon points="60,96.8 62,100 60,103.2 58,100"       fill="#C9A84C" opacity="0.75"/>
      <polygon points="27.1,77.8 29.1,81 27.1,84.2 25.1,81"  fill="#C9A84C" opacity="0.75"/>
      <polygon points="27.1,39.8 29.1,43 27.1,46.2 25.1,43"  fill="#C9A84C" opacity="0.75"/>
      <line x1="60" y1="34" x2="60" y2="42" stroke="#C9A84C" stroke-width="0.9" stroke-opacity="0.5"/>
      <line x1="60" y1="82" x2="60" y2="90" stroke="#C9A84C" stroke-width="0.9" stroke-opacity="0.5"/>
      <path d="M53,53 C50,46 70,44 67,53" fill="none" stroke="#C9A84C" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M67,53 C71,59 49,65 53,71" fill="none" stroke="#C9A84C" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M53,71 C50,78 70,80 67,71" fill="none" stroke="#C9A84C" stroke-width="2.4" stroke-linecap="round"/>
      <line x1="41" y1="62" x2="49" y2="62" stroke="#C9A84C" stroke-width="0.8" stroke-opacity="0.55"/>
      <line x1="71" y1="62" x2="79" y2="62" stroke="#C9A84C" stroke-width="0.8" stroke-opacity="0.55"/>
      <polygon points="60,48 72.1,55 72.1,69 60,76 47.9,69 47.9,55"
        fill="none" stroke="#C9A84C" stroke-width="0.5" stroke-opacity="0.2"/>
    </g>
  </g>
</svg>
