<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#122848"/>
      <stop offset="100%" stop-color="#0B1F3A"/>
    </linearGradient>
    <linearGradient id="gG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#E8C97A"/>
      <stop offset="100%" stop-color="#A8872E"/>
    </linearGradient>
  </defs>

  <!-- Background pill -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Tiny hexagon: cx=16, cy=16, r=13 -->
  <polygon
    points="16,3 28.6,9.5 28.6,22.5 16,29 3.4,22.5 3.4,9.5"
    fill="none" stroke="url(#gG)" stroke-width="1.2" stroke-linejoin="round"/>

  <!-- Inner hex fill: r=10.5 -->
  <polygon
    points="16,5.5 25.1,10.75 25.1,21.25 16,26.5 6.9,21.25 6.9,10.75"
    fill="#0B1F3A"/>

  <!-- S glyph at 32px scale (cx=16,cy=16) -->
  <path d="M13.5,13.5 C12.5,11.5 19,11 18,13.5"
    fill="none" stroke="#C9A84C" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M18,13.5 C19.2,15.5 12.8,17.5 14,19.5"
    fill="none" stroke="#C9A84C" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M14,19.5 C13,21.5 19.5,21 18.5,19.5"
    fill="none" stroke="#C9A84C" stroke-width="1.4" stroke-linecap="round"/>
</svg>
